services:
  - type: web
    name: lumina-api
    runtime: python
    region: singapore
    plan: free
    rootDir: apps/store_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LUMINA_JWT_SECRET
        generateValue: true
      - key: LUMINA_DATABASE_URL
        fromDatabase:
          name: lumina-db
          property: connectionURI
    healthCheckPath: /health

databases:
  - name: lumina-db
    plan: free
    region: singapore
