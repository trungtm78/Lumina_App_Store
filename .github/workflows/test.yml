name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jsonschema pytest pytest-asyncio httpx fastapi uvicorn sqlalchemy aiosqlite pydantic pydantic-settings python-multipart python-jose passlib

      - name: Run tests
        run: |
          python -m pytest packages/config-schema/test_validator.py apps/app_engine/tests/ apps/store_backend/tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: apps/store-frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/store-frontend
        run: pnpm build
